version: "3.8"

services:
  # --- Nginx Load Balancing ---
  nginx-lb:
    image: nginx:latest
    container_name: scnode-load-balancer
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-service-01
      - api-service-02
    networks:
      - scnode-network

  # --- API Node 01 ---
  api-service-01:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: scnode-api-01
    env_file: ./server/.env
    environment:
      - NODE_NAME=ScaleNode-API-01
    depends_on:
      pg-master:
        condition: service_healthy
      pg-slave:
        condition: service_healthy
    networks:
      - scnode-network

  # --- API Node 02 ---
  api-service-02:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: scnode-api-02
    env_file: ./server/.env
    environment:
      - NODE_NAME=ScaleNode-API-02
    depends_on:
      pg-master:
        condition: service_healthy
      pg-slave:
        condition: service_healthy
    networks:
      - scnode-network

  # --- Master Database Node ---
  pg-master:
    image: bitnami/postgresql:latest
    container_name: scnode-db-master
    environment:
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_USERNAME=myuser
      - POSTGRESQL_PASSWORD=mypassword
      - POSTGRESQL_DATABASE=scnode_db
    ports:
      - "5432:5432"
    volumes:
      - ./pg_master_data:/bitnami/postgresql
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRESQL_USERNAME -d $$POSTGRESQL_DATABASE",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - scnode-network

  # --- Slave Database Node (Read Replica) ---
  pg-slave:
    image: bitnami/postgresql:latest
    container_name: scnode-db-slave
    depends_on:
      - pg-master
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_MASTER_HOST=pg-master
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_PASSWORD=mypassword
      - POSTGRESQL_DATABASE=scnode_db
    ports:
      - "5433:5432"
    volumes:
      - ./pg_slave_data:/bitnami/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRESQL_USERNAME -d $$POSTGRESQL_DATABASE",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - scnode-network

networks:
  scnode-network:
    driver: bridge
